name: Build EXE

on:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --onefile --windowed --name WindowsGenuineChecker windows_genuine_checker.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/WindowsGenuineChecker.exe
